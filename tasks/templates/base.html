<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django CRUD Application</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
  <div class="container">
    
    <a class="navbar-brand" href="{% url 'home' %}">Django CRUD</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <!-- LEFT -->
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link me-3" href="{% url 'home' %}">Home</a>
        </li>
      </ul>

      <!-- RIGHT -->
      <ul class="navbar-nav">
        {% if user.is_authenticated %}

        <li class="nav-item">
          <a class="nav-link me-3" href="{% url 'tasks' %}">Tasks Pending</a>
        </li>

        <li class="nav-item">
          <a class="nav-link me-3" href="{% url 'tasks_completed' %}">Completed Tasks</a>
        </li>

        <li class="nav-item">
          <a class="nav-link me-3" href="{% url 'create_task' %}">Create Task</a>
        </li>

        <li class="nav-item">
          <a class="nav-link me-3" href="{% url 'logout' %}">Logout</a>
        </li>

        {% else %}

        <li class="nav-item">
          <a class="nav-link me-3" href="{% url 'signup' %}">Signup</a>
        </li>

        <li class="nav-item">
          <a class="nav-link me-3" href="{% url 'login' %}">Login</a>
        </li>

        {% endif %}
      </ul>

      <!-- SEARCH -->
      <form class="d-flex ms-3" role="search">
        <input class="form-control me-2" type="search" placeholder="Search">
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>

    </div>
  </div>
</nav>

<!-- CONTENIDO -->
<main class="flex-fill">
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
</main>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-3 mt-auto">
    <small>© 2026 Emiliano Martinha</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
